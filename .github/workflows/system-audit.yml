name: System Audit on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  audit:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts/audit
          npm install

      - name: Generate Audit Report
        id: audit
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_DIFF_URL: ${{ github.event.pull_request.diff_url }}
        run: node scripts/audit/generate-audit.js

      - name: Post to Slack
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: "#increff-audits"
          AUDIT_TITLE: ${{ steps.audit.outputs.title }}
          AUDIT_REPORT: ${{ steps.audit.outputs.report }}
          REPO_NAME: "Increff-automation"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: node scripts/audit/post-to-slack.js

      - name: Post to Teams
        continue-on-error: true
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          AUDIT_TITLE: ${{ steps.audit.outputs.title }}
          AUDIT_REPORT: ${{ steps.audit.outputs.report }}
          REPO_NAME: "Increff-automation"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: node scripts/audit/post-to-teams.js

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          AUDIT_REPORT: ${{ steps.audit.outputs.report }}
          AUDIT_TITLE: ${{ steps.audit.outputs.title }}
        with:
          script: |
            const title = process.env.AUDIT_TITLE;
            const report = process.env.AUDIT_REPORT;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 System Audit Report\n\n**Suggested Title:** \`${title}\`\n\n${report}`
            });
